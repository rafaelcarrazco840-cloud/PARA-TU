<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PARA TU 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #ffd6e0, #fff);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .contenedor {
      text-align: center;
      animation: aparecer 2s ease;
    }

    img {
      width: 350px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      margin-top: 20px;
      color: #ff4d88;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <img src="silve_flores.png.png" alt="Silver con flores">
    
    <h1>Para ti 💖</h1>
    <p>Espero que te guste este pequeño detalle 🌸</p>
  </div>

</body>
</html>
